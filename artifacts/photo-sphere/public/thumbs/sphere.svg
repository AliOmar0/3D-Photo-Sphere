<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a2a55"/>
      <stop offset="60%" stop-color="#070815"/>
      <stop offset="100%" stop-color="#03030c"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6aa8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6aa8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="270" fill="url(#bg)"/>
  <circle cx="240" cy="135" r="120" fill="url(#glow)"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="60" cy="40" r="0.8"/><circle cx="110" cy="200" r="0.6"/>
    <circle cx="380" cy="60" r="0.9"/><circle cx="430" cy="180" r="0.7"/>
    <circle cx="40" cy="240" r="0.5"/><circle cx="450" cy="30" r="0.6"/>
    <circle cx="180" cy="20" r="0.5"/><circle cx="320" cy="250" r="0.6"/>
    <circle cx="20" cy="120" r="0.4"/><circle cx="460" cy="120" r="0.7"/>
    <circle cx="200" cy="250" r="0.5"/><circle cx="290" cy="15" r="0.4"/>
  </g>
  <!-- Photo tiles arranged around sphere -->
  <g transform="translate(240 135)">
    <g opacity="0.95">
      <rect x="-22" y="-90" width="44" height="32" rx="2" fill="#ff8a6b" stroke="#fff" stroke-opacity="0.5"/>
      <rect x="-95" y="-50" width="44" height="32" rx="2" fill="#7cd1ff" stroke="#fff" stroke-opacity="0.5" transform="rotate(-22 -73 -34)"/>
      <rect x="55" y="-50" width="44" height="32" rx="2" fill="#b389ff" stroke="#fff" stroke-opacity="0.5" transform="rotate(22 77 -34)"/>
      <rect x="-22" y="58" width="44" height="32" rx="2" fill="#ffd56a" stroke="#fff" stroke-opacity="0.5"/>
      <rect x="-95" y="20" width="44" height="32" rx="2" fill="#6affc0" stroke="#fff" stroke-opacity="0.5" transform="rotate(22 -73 36)"/>
      <rect x="55" y="20" width="44" height="32" rx="2" fill="#ff6aa9" stroke="#fff" stroke-opacity="0.5" transform="rotate(-22 77 36)"/>
      <rect x="-22" y="-15" width="44" height="32" rx="2" fill="#a0e8ff" stroke="#fff" stroke-opacity="0.7"/>
    </g>
  </g>
  <!-- Hand silhouette hint -->
  <g transform="translate(380 200)" fill="none" stroke="#7cf2ff" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <path d="M 0 30 L 0 0"/>
    <path d="M -8 30 L -10 5"/>
    <path d="M 8 30 L 10 8"/>
    <path d="M -16 32 L -22 14"/>
    <circle cx="0" cy="0" r="2"/><circle cx="-10" cy="5" r="2"/><circle cx="10" cy="8" r="2"/>
  </g>
</svg>
