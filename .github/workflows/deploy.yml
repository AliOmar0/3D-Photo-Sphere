name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build photo-sphere for GitHub Pages
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: "/3D-Photo-Sphere/"
        run: pnpm --filter @workspace/photo-sphere run build

      - name: Add SPA 404 fallback
        run: cp artifacts/photo-sphere/dist/public/index.html artifacts/photo-sphere/dist/public/404.html

      - name: Disable Jekyll processing
        run: touch artifacts/photo-sphere/dist/public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/photo-sphere/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
